<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>優ちゃんのお金管理アプリ</title>
    <style>
        :root { --yu-pink: #ffc0cb; --yu-heart: #ff1493; --yu-gold: #ffd700; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #fff5f7; text-align: center; margin: 0; padding: 20px; color: #444; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255,182,193,0.4); border: 3px solid var(--yu-pink); }
        h1 { color: var(--yu-heart); font-size: 1.4rem; margin-bottom: 5px; }
        .yu-photo-container { position: relative; width: 180px; height: 180px; margin: 0 auto 15px; }
        .yu-photo { width: 100%; height: 100%; border-radius: 50%; border: 6px double var(--yu-heart); object-fit: cover; background-color: #eee; }
        .heart-icon { position: absolute; bottom: 10px; right: 10px; font-size: 2rem; animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .yu-comment { background: #fff; border: 2px solid var(--yu-pink); padding: 15px; border-radius: 15px; min-height: 60px; margin-bottom: 20px; font-weight: bold; color: #d02090; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        .input-card { background: #fffafa; padding: 15px; border-radius: 15px; border: 1px solid #ffe4e1; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #888; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 2px solid var(--yu-pink); border-radius: 12px; box-sizing: border-box; font-size: 1rem; outline: none; margin-bottom: 10px; }
        .btn-submit { background: linear-gradient(45deg, #ff69b4, #ff1493); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(255,20,147,0.3); }
        .summary-box { background: linear-gradient(135deg, #fff0f5, #ffe4e1); padding: 20px; border-radius: 20px; margin-top: 25px; border: 2px dashed var(--yu-heart); }
        .summary-amount { font-size: 1.8rem; font-weight: bold; color: #ff1493; }
        .history-item { background: white; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--yu-pink); box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: left; }
        .paid-btn { border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>💖 優ちゃんのお金管理アプリ 💖</h1>
    
    <div class="yu-photo-container">
        <img src="images/yu (1).jpg" alt="優ちゃん" class="yu-photo" id="yuImage">
        <div class="heart-icon">💕</div>
    </div>
    
    <div class="yu-comment" id="yuSpeech">「ねえ、今日は優ちゃんに何を捧げてくれるの？」</div>

    <div class="input-card">
        <label>支払った金額</label>
        <input type="number" id="amount" placeholder="金額を入力してね">
        
        <label>支払った人</label>
        <select id="payer">
            <option value="yu">優ちゃん</option>
            <option value="other">優ちゃん以外の人</option>
        </select>
        
        <button class="btn-submit" onclick="addRecord()">愛を記録する（送信）</button>
    </div>

    <div class="summary-box">
        <div id="summaryLabel" style="font-size: 0.9rem; color: #ff69b4; margin-bottom: 10px;">現在の清算状況</div>
        <div class="summary-amount" id="summaryAmount">0円</div>
        <div style="font-size: 0.7rem; color: #ff69b4; margin-top: 5px;">※優ちゃんの笑顔はプライスレスです</div>
    </div>

    <div id="historyList" style="margin-top: 30px;">
        <h3 style="font-size:1rem; color:var(--yu-heart);">愛の足跡（履歴）</h3>
    </div>
    
    <button style="margin-top:40px; font-size: 0.7rem; background:none; border:none; color:#ccc; text-decoration: underline; cursor: pointer;" onclick="clearAll()">思い出を全てリセットする</button>
</div>

<script>
    // --- 【設定】画像リストの自動生成 ---
    const yuImages = [];
    for (let i = 1; i <= 30; i++) {
        // Windows一括リネーム「yu (1).jpg」の形式
        yuImages.push(`images/yu (${i}).jpg`);
    }

    // --- 【設定】セリフ50パターン ---
    const yuQuotes = [
        "たくさん使いましたねえ。優ちゃんのために？", "もうちょっと節約したらどうですか？", "優ちゃん、これ欲しかったんだ！最高！", "えっ、これだけ？優ちゃんへの愛はその程度？", "さすが優ちゃんの選んだ人、かっこいい！",
        "お金は天下の回りもの、優ちゃんの元に集まるもの。", "次のデートはもっと豪華でもいいんだよ？", "優ちゃんへの投資は、将来の幸せへの投資だよ！", "ちょっと使いすぎじゃない？優ちゃんが管理しようか？", "ふーん、これにそんなに払ったんだ…。",
        "優ちゃんとの思い出が増えるなら安いもんでしょ？", "今の決済、優ちゃんへの愛が100点満点だったよ！", "優ちゃんに貢げるなんて、幸せ者だね！", "美味しいもの食べて、優ちゃんもご機嫌です♪", "次はお高いスイーツが食べたいな〜？",
        "ねえ、優ちゃんのこと甘やかしすぎじゃない？…好きだけど。", "しっかり働いて、また優ちゃんを遊びに連れてって！", "優ちゃんのために使うお金って、魔法みたいに消えるね。", "今の金額、優ちゃんの可愛さに比べたら誤差だよね。", "お財布、大丈夫？優ちゃんがぎゅーってしてあげようか？",
        "優ちゃん銀行へのご入金、ありがとうございます！", "この記録、一生忘れないからね", "そんなに優ちゃんのこと喜ばせたいんだ？ニヤニヤしちゃう。", "優ちゃんとの時間はプライスレス。でも支払いは現実！", "明日からはもやし生活かな？でも優ちゃんはステーキがいいな！",
        "優ちゃんの笑顔、一回につき100万円だけど、今日は特別にタダだよ？", "こんなに使って…優ちゃんのこと、本当に好きなんだね。", "経済回してるね〜！優ちゃんも鼻が高いよ！", "その調子でどんどん優ちゃんを幸せにしてね！", "今日の優ちゃん、いつもより3割増しで可愛かったでしょ？",
        "優ちゃんにお金を使える権利をあげます！感謝してね？", "お金持ちになっても、優ちゃんのことだけ見ててね。", "これ、優ちゃんへのプレゼントってことでいい？", "優ちゃんのために頑張る姿、一番カッコいいと思うよ。", "使いすぎ注意！でも優ちゃんへのプレゼントは別腹だよ！",
        "ねえねえ、次のお休みはどこに連れてってくれるの？", "優ちゃん、もっと贅沢させてもらってもいいんだよ？", "記録完了！あなたの愛をしっかり受け取ったよ。", "優ちゃん専用ATMだね！", "こんなに優ちゃんに尽くしてくれるなんて、前世で徳を積んだね？",
        "支払うたびに優ちゃんの好感度が上がってる気がする！", "優ちゃんのわがまま、これからも聞いてくれる？", "今日も一日、優ちゃんの隣にいてくれてありがとう。", "お買い物楽しかった！優ちゃん、大満足です！", "さて、次は何をシェアしましょうか？",
        "お金じゃ買えない価値が優ちゃんにはあるんだよ？わかってる？", "優ちゃんへの愛、本日も絶好調だね！", "この金額分、あとで優ちゃんがいっぱい褒めてあげる。", "貯金も大事だけど、今の優ちゃんとの時間も大事だよね！", "優ちゃんのために使うお金は、きっと幸運を呼ぶよ！"
    ];

    let records = JSON.parse(localStorage.getItem('yuRecords')) || [];

    function updateView() {
        const historyList = document.getElementById('historyList');
        const summaryAmount = document.getElementById('summaryAmount');
        const summaryLabel = document.getElementById('summaryLabel');
        
        // 履歴表示のリセット（タイトルだけ残す）
        historyList.innerHTML = '<h3 style="font-size:1rem; color:var(--yu-heart);">愛の足跡（履歴）</h3>';
        
        let totalYuPaid = 0;
        let totalOtherPaid = 0;

        // 履歴を新しい順に作成
        records.slice().reverse().forEach((rec, originalIndex) => {
            const index = records.length - 1 - originalIndex;
            const item = document.createElement('div');
            item.className = 'history-item';
            const payerName = rec.payer === 'yu' ? '優ちゃん' : 'あなた';
            
            item.innerHTML = `
                <div>
                    <strong style="color:${rec.payer === 'yu' ? '#ff69b4' : '#333'}">${rec.amount.toLocaleString()}円</strong> 
                    <span style="font-size:0.7rem; color:#666;">by ${payerName}</span><br>
                    <small style="color:#999;">${rec.date}</small>
                </div>
                <button onclick="togglePaid(${index})" class="paid-btn" style="background:${rec.paid ? '#e0e0e0' : 'linear-gradient(to right, #ffb6c1, #ff69b4)'}; color:${rec.paid ? '#999' : 'white'}">
                    ${rec.paid ? '精算済み' : '未精算'}
                </button>
            `;
            historyList.appendChild(item);

            if (!rec.paid) {
                if (rec.payer === 'yu') totalYuPaid += Number(rec.amount);
                else totalOtherPaid += Number(rec.amount);
            }
        });

        // 割り勘計算
        const diff = (totalYuPaid - totalOtherPaid) / 2;
        if (diff > 0) {
            summaryLabel.innerText = "あなたが優ちゃんに支払う額";
            summaryAmount.innerText = `${Math.abs(diff).toLocaleString()}円`;
        } else if (diff < 0) {
            summaryLabel.innerText = "優ちゃんからの「ありがとう」の重み";
            summaryAmount.innerText = `${Math.abs(diff).toLocaleString()}円分`;
        } else {
            summaryLabel.innerText = "現在は愛の均衡が保たれています";
            summaryAmount.innerText = "0円";
        }

        localStorage.setItem('yuRecords', JSON.stringify(records));
    }

    function addRecord() {
        const amountEl = document.getElementById('amount');
        const payerEl = document.getElementById('payer');
        if (!amountEl.value || amountEl.value <= 0) return;

        const newRecord = {
            amount: parseInt(amountEl.value),
            payer: payerEl.value,
            date: new Date().toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}),
            paid: false
        };

        records.push(newRecord);
        amountEl.value = '';
        
        // セリフと写真をランダムに変更
        document.getElementById('yuSpeech').innerText = `「${yuQuotes[Math.floor(Math.random() * yuQuotes.length)]}」`;
        document.getElementById('yuImage').src = yuImages[Math.floor(Math.random() * yuImages.length)];
        
        updateView();
    }

    function togglePaid(index) {
        records[index].paid = !records[index].paid;
        updateView();
    }

    function clearAll() {
        if(confirm('優ちゃんとの大切な記録を消しちゃうの…？（全データ削除）')) {
            records = [];
            updateView();
            document.getElementById('yuSpeech').innerText = "「また新しい思い出、作ろうね？」";
        }
    }

    // 起動時に表示を更新
    updateView();
</script>

</body>
</html>
